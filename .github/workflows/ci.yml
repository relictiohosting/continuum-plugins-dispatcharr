name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build versioned binary and manifest
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          BIN="dispatcharr-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w -X main.buildVersion=${VERSION}" -o "dist/${BIN}" .

          chmod +x "dist/${BIN}"
          CHECKSUM="$(sha256sum "dist/${BIN}" | awk '{print $1}')"
          printf '%s  %s\n' "${CHECKSUM}" "${BIN}" > "dist/${BIN}.sha256"
          export VERSION CHECKSUM
          export GOOS_MATRIX="${{ matrix.goos }}"
          export GOARCH_MATRIX="${{ matrix.goarch }}"
          export BIN_NAME="${BIN}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          checksum = os.environ["CHECKSUM"]
          goos = os.environ["GOOS_MATRIX"]
          goarch = os.environ["GOARCH_MATRIX"]
          bin_name = os.environ["BIN_NAME"]

          manifest_path = Path("manifest.json")
          out_path = Path("dist") / f"{bin_name}.manifest.json"

          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          data["version"] = version
          data["checksum"] = checksum
          data["supported_platforms"] = [{"os": goos, "arch": goarch}]

          out_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dispatcharr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            NAME="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            TAG="snapshot-${GITHUB_SHA::12}"
            NAME="snapshot-${GITHUB_SHA::12}"
            PRERELEASE="true"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: release-dist/*
